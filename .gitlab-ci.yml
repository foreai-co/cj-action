# .gitlab-ci.yml

stages:
  - build
  - release

variables:
  IMAGE_NAME: registry.gitlab.com/foreai-co/cj-action

build-and-push-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_TAG -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$CI_COMMIT_TAG
    - docker push $IMAGE_NAME:latest

publish-to-catalog:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Publishing Critical Journey $CI_COMMIT_TAG to the CI/CD Catalog"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Critical Journey GitLab CI/CD Component $CI_COMMIT_TAG"
